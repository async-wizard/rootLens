global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ingestion-service:8085']

  - job_name: incident-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['incident-engine:8083']

  - job_name: ai-analysis-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ai-analysis-service:8084']

  - job_name: dashboard-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['dashboard-backend:8086']
