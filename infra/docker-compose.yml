networks:
  rootlens-network:

volumes:
  postgres-data:
  kafka-data:
  redis-data:
  grafana-data:

services:
    kafka:
      image: confluentinc/cp-kafka:7.6.1
      container_name: kafka

      ports:
        - "9092:9092"

      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_DEFAULT_REPLICATION_FACTOR: 1
        KAFKA_MIN_INSYNC_REPLICAS: 1

      healthcheck:
        test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
        interval: 10s
        timeout: 10s
        retries: 10
        start_period: 30s

      networks:
        - rootlens-network

    kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui

      ports:
        - "8080:8080"

      environment:
        - KAFKA_CLUSTERS_0_NAME=rootlens-cluster
        - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

      depends_on:
        - kafka

      networks:
        - rootlens-network

    redis:
      image: redis:7
      container_name: redis

      ports:
        - "6380:6379"

      volumes:
        - redis-data:/data

      networks:
        - rootlens-network

    postgres:
      image: postgres:16
      container_name: postgres

      ports:
        - "5432:5432"

      environment:
        POSTGRES_DB: rootlens
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: admin

      volumes:
        - postgres-data:/var/lib/postgresql/data

      networks:
        - rootlens-network

    jaeger:
      image: jaegertracing/all-in-one:latest
      container_name: jaeger

      ports:
        - "16686:16686"
        - "4318:4318"

      networks:
        - rootlens-network

    ingestion-service:
      build: ../services/ingestion-service
      container_name: ingestion-service

      ports:
        - "8085:8085"

      environment:
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

      depends_on:
        kafka:
          condition: service_healthy

      networks:
        - rootlens-network

    incident-engine:
      build: ../services/incident-engine
      container_name: incident-engine

      ports:
        - "8083:8083"

      environment:
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
        - POSTGRES_HOST=postgres
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=admin
        - REDIS_HOST=redis
        - REDIS_PORT=6379
        - ROOTLENS_ALERT_WEBHOOK_URL=${ROOTLENS_ALERT_WEBHOOK_URL:-}

      depends_on:
        kafka:
          condition: service_healthy
        postgres:
          condition: service_started
        redis:
          condition: service_started

      networks:
        - rootlens-network

    ai-analysis-service:
      build: ../services/ai-analysis-service
      container_name: ai-analysis-service

      ports:
        - "8084:8084"

      environment:
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
        - POSTGRES_HOST=postgres
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=admin
        - AI_PROVIDER=${AI_PROVIDER:-claude}
        - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
        - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
        - GROQ_API_KEY=${GROQ_API_KEY:-}
        - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      depends_on:
        kafka:
          condition: service_healthy
        postgres:
          condition: service_started

      networks:
        - rootlens-network

    dashboard-backend:
      build: ../services/dashboard-backend
      container_name: dashboard-backend

      ports:
        - "8086:8086"

      environment:
        - POSTGRES_HOST=postgres
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=admin
        - REDIS_HOST=redis
        - REDIS_PORT=6379
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

      depends_on:
        kafka:
          condition: service_healthy
        postgres:
          condition: service_started
        redis:
          condition: service_started

      networks:
        - rootlens-network

    prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      networks:
        - rootlens-network

    grafana:
      image: grafana/grafana:latest
      container_name: grafana
      ports:
        - "3000:3000"
      environment:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_SECURITY_ADMIN_USER: admin
      volumes:
        - ./grafana/provisioning:/etc/grafana/provisioning:ro
        - grafana-data:/var/lib/grafana
      depends_on:
        - prometheus
      networks:
        - rootlens-network

    payment-service:
      build: ../simulations/payment-service
      container_name: payment-service

      ports:
        - "8082:8082"

      environment:
        - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
        - OTEL_SERVICE_NAME=payment-service
        - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
        - OTEL_TRACES_EXPORTER=otlp
        - OTEL_METRICS_EXPORTER=none
        - OTEL_LOGS_EXPORTER=none
        - ROOTLENS_INGESTION_URL=http://ingestion-service:8085

      volumes:
        - /home/sasmit_shubham/observability/opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro

      depends_on:
        - jaeger
        - ingestion-service

      networks:
        - rootlens-network

    checkout-service:
      build: ../simulations/checkout-service
      container_name: checkout-service

      ports:
        - "8081:8081"

      environment:
        - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
        - OTEL_SERVICE_NAME=checkout-service
        - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
        - OTEL_TRACES_EXPORTER=otlp
        - OTEL_METRICS_EXPORTER=none
        - OTEL_LOGS_EXPORTER=none
        - SERVICES_PAYMENT_URL=http://payment-service:8082
        - ROOTLENS_INGESTION_URL=http://ingestion-service:8085
        - ROOTLENS_SIMULATION_AUTO_TRIGGER_ENABLED=true
        - ROOTLENS_SIMULATION_AUTO_TRIGGER_INTERVAL_MS=30000

      volumes:
        - /home/sasmit_shubham/observability/opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro

      depends_on:
        - payment-service
        - jaeger
        - ingestion-service

      networks:
        - rootlens-network
